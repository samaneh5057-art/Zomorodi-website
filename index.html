<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body data-bs-spy="scroll" data-bs-target="#navbar" data-bs-offset="80" tabindex="0">


    <nav class="navbar navbar-expand-lg fixed-top">

        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="#">
                <img src="./img/logo-removebg-preview.png" alt="Logo" height="55">
            </a>

            <!-- Hamburger Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Collections</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Testimonials</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>


                <div class="d-flex align-items-center gap-3">

                    <a href="#" class="icon-link">
                        <i class="bi bi-heart"></i>
                    </a>

                    <a href="#" class="icon-link">
                        <i class="bi bi-bag"></i>
                    </a>

                </div>
            </div>

        </div>

    </nav>



    <section class="hero">

        <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="img/slide1.jpg" class="d-block w-100" alt="slide1">
                </div>

                <div class="carousel-item">
                    <img src="img/slide2.jpg" class="d-block w-100" alt="slide2">
                </div>

                <div class="carousel-item">
                    <img src="img/slide3.jpg" class="d-block w-100" alt="slide3">
                </div>

            </div>

        </div>

    </section>





















    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS برای تغییر رنگ نوبار -->
    <script>
        window.addEventListener("scroll", function () {
            let navbar = document.querySelector(".navbar");

            if (window.scrollY > 80) {
                navbar.classList.add("scrolled");
            } else {
                navbar.classList.remove("scrolled");
            }
        });
    </script>
</body>

</html>
